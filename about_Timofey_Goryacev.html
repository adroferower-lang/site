<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bio — friend</title>
<style>
  :root{
    --bg1:#02030a;
    --bg2:#0b1120;
    --accent:#2f7bff;
    --muted:#8ca0ff;
    --glass:rgba(15,20,40,0.65);
    --shadow:0 18px 40px rgba(10,50,150,0.3);
    --radius:20px;
    --mono:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
    --sans:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  html,body{
    margin:0;padding:0;height:100%;
    font-family:var(--sans);
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
    display:flex;align-items:center;justify-content:center;
    color:#e4eaff;
  }
  
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(900px 380px at 8% 12%, rgba(25,35,90,0.35) 0%, transparent 24%),
      radial-gradient(700px 300px at 92% 88%, rgba(30,50,150,0.25) 0%, transparent 22%);
    z-index:-1;
    filter: blur(18px);
    opacity:.88;
  }

  .page{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
    box-sizing:border-box;
  }

  .card{
    width:min(880px,92vw);
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.05);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display:grid;
    grid-template-columns: 160px 1fr;
    gap:26px;
    padding:34px;
    align-items:center;
    position:relative;
    transform-origin:center;
    animation: fadeIn 760ms cubic-bezier(.2,.9,.2,1) both;
    border: 1px solid rgba(255,255,255,0.08);
  }

  @keyframes fadeIn{from{opacity:0; transform:translateY(10px) scale(.998)} to{opacity:1; transform:none}}

  .avatar-wrap{
    width:160px;height:160px;border-radius:18px;overflow:hidden;
    box-shadow:0 12px 30px rgba(10,50,150,0.2);
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
    transition: transform 400ms ease;
  }
  .avatar-wrap:hover{transform: translateY(-6px) scale(1.02)}
  .avatar{width:100%;height:100%;object-fit:cover;display:block;}

  .head{display:flex;flex-direction:column;gap:10px;padding-right:6px;}
  .nick{font-size:clamp(28px,4.4vw,44px);font-weight:900;color:#ffffff;display:flex;align-items:center;gap:12px;line-height:1;}
  .tag{
    background:linear-gradient(90deg,#10152b,#152045);
    border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;color:#5ca0ff;
    box-shadow:0 8px 20px rgba(20,60,200,0.2);
  }
  
  .sub{
    font-family:var(--mono);
    font-size:15px;
    color:#a8b8ff;
    min-height:24px;
    white-space:pre-wrap;
    max-width:72ch;
    line-height:1.4;
  }
  .cursor{
    display:inline-block;width:10px;height:18px;
    background:linear-gradient(180deg,#9fb7ff,#4a6bff);
    margin-left:6px;vertical-align:bottom;
    border-radius:2px;
    animation: blink 900ms steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}

  .float{
    position:absolute;
    right:-46px;
    top:-26px;
    width:220px;
    height:80px;
    background: linear-gradient(180deg, rgba(20,25,60,0.9), rgba(15,20,40,0.9));
    border-radius:14px;
    box-shadow: 0 12px 30px rgba(30,60,200,0.25);
    padding:12px;
    font-family:var(--mono);
    font-size:14px;
    color:#8ca0ff;
    transform: rotate(6deg);
    display:flex;
    flex-direction:column;
    justify-content:center;
    opacity:0;
    animation: floatIn 900ms 220ms cubic-bezier(.2,.9,.2,1) forwards;
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
  }
  @keyframes floatIn{from{opacity:0; transform:translateY(-8px) rotate(6deg)} to{opacity:1; transform:translateY(0) rotate(6deg)}}

  @media (max-width:680px){
    .card{grid-template-columns:1fr; gap:18px; padding:22px;}
    .avatar-wrap{width:128px;height:128px;margin:0 auto;}
    .head{align-items:center;text-align:center;}
    .float{display:none}
  }

  .card-floating{will-change: transform;}
</style>
</head>
<body>
  <div class="page">
    <main class="card card-floating" role="main" aria-label="Био друга">
      <div class="avatar-wrap">
        <img class="avatar" src="https://i.pinimg.com/736x/49/0e/9f/490e9f1b8db9d815b5aa0937d24dce93.jpg" alt="avatar">
      </div>

      <div class="head">
        <div class="nick">
          <span>friend</span>
          <span class="tag">самый пиздатый фембой (наверно)</span>
        </div>

        <div class="sub" id="subtext"></div>
      </div>

      <div class="float">
        python coder
      </div>
    </main>
  </div>

<script>
(function(){
  const el=document.getElementById('subtext');
  const text="10 years old";
  let i=0, displayed="";
  function typeStep(){
    const base=44;
    const jitter=(Math.random()*60)-10;
    const delay=Math.max(18, base+jitter);
    if(i<text.length){
      displayed+=text[i];
      el.textContent=displayed;
      i++;
      setTimeout(typeStep,delay);
    } else {
      const c=document.createElement('span');
      c.className='cursor';
      el.appendChild(c);
    }
  }
  setTimeout(typeStep,420);

  (function gentleFloat(){
    const card=document.querySelector('.card-floating');
    let t=0;
    function tick(){
      t+=0.01;
      const x=Math.sin(t*0.9)*0.8;
      const y=Math.cos(t*0.7)*0.9;
      const r=Math.sin(t*0.35)*0.2;
      card.style.transform=`translate3d(${x}px, ${y}px, 0) rotate(${r}deg)`;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
})();
</script>
</body>
</html>
