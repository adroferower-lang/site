<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>f3xploit — Bio</title>
<style>
  :root{
    --bg:#0a0a0a;
    --accent:#ff1ab1;
    --text:#f0f0f0;
    --muted:#d18ccf;
    --glass:rgba(20,0,20,0.55);
    --shadow:0 0 25px rgba(255,26,177,0.45);
    --radius:18px;
    --mono:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
    --sans:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  html,body{
    margin:0;padding:0;height:100%;
    font-family:var(--sans);
    background:#0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 10% 10%, rgba(255,26,177,0.15) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(255,26,177,0.1) 0%, transparent 35%);
    z-index:-1;
    filter: blur(120px);
  }

  .page{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    box-sizing:border-box;
  }

  .card{
    width:min(880px,92vw);
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.2);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display:grid;
    grid-template-columns: 160px 1fr;
    gap:24px;
    padding:30px;
    align-items:center;
    position:relative;
    transform-origin:center;
    animation: fadeIn 0.8s ease-out;
    border:1px solid rgba(255,26,177,0.35);
  }

  @keyframes fadeIn{from{opacity:0; transform:translateY(10px) scale(.98)} to{opacity:1; transform:none}}

  .avatar-wrap{
    width:160px;height:160px;border-radius:50%;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background: rgba(30,0,30,0.5);
    box-shadow: 0 0 25px rgba(255,26,177,0.6);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }
  .avatar-wrap:hover{
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(255,26,177,0.9);
  }
  .avatar{width:100%;height:100%;object-fit:cover;display:block;}

  .head{display:flex;flex-direction:column;gap:10px;padding-right:6px;}
  .nick{font-size:clamp(28px,4.4vw,44px);font-weight:900;color:var(--accent);display:flex;align-items:center;gap:12px;line-height:1;text-shadow:0 0 6px rgba(255,26,177,0.6);}
  .tag{
    background: rgba(30,0,30,0.6);
    border-radius:12px;padding:8px 12px;font-size:13px;font-weight:800;color:var(--accent);
    box-shadow:0 0 12px rgba(255,26,177,0.5);
  }

  .sub{
    font-family:var(--mono);
    font-size:15px;
    color:var(--text);
    min-height:24px;
    white-space:pre-wrap;
    max-width:72ch;
    line-height:1.4;
    text-shadow:0 0 6px rgba(255,26,177,0.3);
  }

  .cursor{
    display:inline-block;
    width:10px;height:18px;
    background:linear-gradient(180deg,var(--accent),#ff99dc);
    margin-left:6px;
    vertical-align:bottom;
    border-radius:2px;
    animation: blink 900ms steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}

  .float{
    position:absolute;
    right:-46px;
    top:-26px;
    width:220px;
    height:80px;
    background: rgba(20,0,20,0.65);
    border-radius:14px;
    box-shadow:0 0 20px rgba(255,26,177,0.5);
    padding:12px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--accent);
    transform: rotate(6deg);
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    opacity:0;
    animation: floatIn 0.9s 0.22s cubic-bezier(.2,.9,.2,1) forwards;
    border:1px solid rgba(255,26,177,0.35);
  }
  @keyframes floatIn{from{opacity:0; transform:translateY(-8px) rotate(6deg)} to{opacity:1; transform:translateY(0) rotate(6deg)}}

  @media (max-width:680px){
    .card{grid-template-columns:1fr; gap:18px; padding:22px;}
    .avatar-wrap{width:128px;height:128px;margin:0 auto;}
    .head{align-items:center;text-align:center;}
    .float{display:none}
  }

  .card-floating{will-change: transform;}
</style>
</head>
<body>
<div class="page">
<main class="card card-floating" role="main" aria-label="Био f3xploit">
  <div class="avatar-wrap" aria-hidden="true">
    <img class="avatar" src="https://i.pinimg.com/736x/d5/40/c9/d540c97d55a6c737184bfe51bd631bbf.jpg" alt="avatar f3xploit">
  </div>

  <div class="head">
    <div class="nick" aria-hidden="false">
      <span>f3xploit</span>
      <span class="tag">самый пиздатый фембой (наверно)</span>
    </div>
    <div class="sub" id="subtext" aria-live="polite"></div>
  </div>

  <div class="float" aria-hidden="true">
    <div>сосал ?</div>
  </div>
</main>
</div>

<script>
(function(){
  const el=document.getElementById('subtext');
  const text="мне 14 лет, люблю программировать на C# и Python";
  let i=0, displayed="";
  function typeStep(){
    const base=44;
    const jitter=(Math.random()*60)-10;
    const delay=Math.max(18, base+jitter);
    if(i<text.length){
      displayed+=text[i];
      el.textContent=displayed;
      i++;
      setTimeout(typeStep,delay);
    } else {
      const c=document.createElement('span');
      c.className='cursor';
      el.appendChild(c);
    }
  }
  setTimeout(typeStep,420);

  (function gentleFloat(){
    const card=document.querySelector('.card-floating');
    let t=0;
    function tick(){
      t+=0.01;
      const x=Math.sin(t*0.9)*1;
      const y=Math.cos(t*0.7)*1;
      const r=Math.sin(t*0.35)*0.3;
      card.style.transform=`translate3d(${x}px, ${y}px, 0) rotate(${r}deg)`;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
})();
</script>
</body>
</html>
